name: MerchQuantum Smoke Test

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3,15 * * *"

jobs:
  smoke-test:
    name: Twice-daily smoke test scaffold
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        id: install
        continue-on-error: true
        run: npm ci

      - name: Typecheck
        id: typecheck
        continue-on-error: true
        run: npx tsc --noEmit

      - name: Production build
        id: build
        continue-on-error: true
        run: npm run build

      - name: Provider smoke regression
        id: provider_smoke
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p smoke-report
          npx --yes tsx tests/providers/provider-core.test.ts 2>&1 | tee smoke-report/provider-smoke.log

      - name: AI golden corpus smoke regression
        id: ai_smoke
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p smoke-report
          npx --yes tsx tests/ai/listing-engine.test.ts 2>&1 | tee smoke-report/ai-smoke.log

      - name: Generate structured smoke report
        if: always()
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF: ${{ github.ref }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SHA: ${{ github.sha }}
          INSTALL_OUTCOME: ${{ steps.install.outcome }}
          TYPECHECK_OUTCOME: ${{ steps.typecheck.outcome }}
          BUILD_OUTCOME: ${{ steps.build.outcome }}
          PROVIDER_SMOKE_OUTCOME: ${{ steps.provider_smoke.outcome }}
          AI_SMOKE_OUTCOME: ${{ steps.ai_smoke.outcome }}
        run: |
          node scripts/generate-smoke-report.mjs \
            --provider-log smoke-report/provider-smoke.log \
            --ai-log smoke-report/ai-smoke.log \
            --output smoke-report/report.json

      - name: Upload smoke report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: merchquantum-smoke-report
          path: smoke-report/

      - name: Enforce smoke workflow result
        if: always()
        shell: bash
        run: |
          if [ "${{ steps.install.outcome }}" != "success" ] || \
             [ "${{ steps.typecheck.outcome }}" != "success" ] || \
             [ "${{ steps.build.outcome }}" != "success" ] || \
             [ "${{ steps.provider_smoke.outcome }}" != "success" ] || \
             [ "${{ steps.ai_smoke.outcome }}" != "success" ]; then
            echo "MerchQuantum smoke workflow failed. See uploaded artifact for structured details."
            exit 1
          fi
